<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="店小二">
<meta name="theme-color" content="#C0202A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>智能店小二</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#C0202A;--red-dark:#8B1218;--red-deep:#6B0D13;
  --gold:#D4A017;--gold-light:#F0C84A;
  --cream:#FDF6E3;--text-dark:#2A0A0A;--text-mid:#7A3A3A;--text-light:#B07070;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Serif SC','PingFang SC','Helvetica Neue',sans-serif;background:var(--red-deep);display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* 解锁页 */
.unlock-overlay{position:fixed;inset:0;background:var(--red-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;padding:30px;}
.unlock-overlay.hidden{display:none;}
.unlock-icon{font-size:72px;animation:bounce 1.5s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.unlock-title{font-size:26px;font-weight:700;color:var(--gold-light);letter-spacing:4px;}
.unlock-sub{font-size:14px;color:rgba(240,200,74,0.65);text-align:center;line-height:2;}
.unlock-btn{margin-top:8px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--red-deep);border:none;border-radius:50px;padding:18px 56px;font-size:20px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:3px;box-shadow:0 6px 24px rgba(0,0,0,0.4);}
.unlock-btn:active{transform:scale(0.96);}

/* 顶部 */
.top-bar{background:linear-gradient(135deg,var(--red-dark),var(--red));padding-top:calc(env(safe-area-inset-top,0px) + 14px);padding-bottom:10px;padding-left:20px;padding-right:20px;text-align:center;border-bottom:2px solid var(--gold);flex-shrink:0;}
.store-name{font-size:20px;font-weight:700;color:var(--gold-light);letter-spacing:4px;}
.store-sub{font-size:11px;color:rgba(240,200,74,0.7);letter-spacing:2px;margin-top:2px;}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(env(safe-area-inset-bottom,0px) + 20px);}
.inner{max-width:440px;margin:0 auto;}

/* 结果大显示 */
.result-big{
  background:linear-gradient(135deg,rgba(139,18,24,0.9),rgba(107,13,19,0.9));
  border:2px solid var(--gold);border-radius:20px;
  text-align:center;padding:20px 16px;margin-bottom:14px;margin-top:12px;
  min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  transition:all 0.3s;
}
.result-idle{font-size:15px;color:rgba(240,200,74,0.6);letter-spacing:2px;}
.result-product-name{font-size:18px;color:var(--gold-light);margin-bottom:6px;letter-spacing:2px;}
.result-price-big{font-size:64px;font-weight:700;color:white;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,0.5);}
.result-price-unit{font-size:20px;color:rgba(255,255,255,0.8);}
.result-notfound{font-size:16px;color:rgba(240,200,74,0.7);letter-spacing:1px;}
.result-notfound span{font-size:13px;display:block;margin-top:6px;color:rgba(240,200,74,0.45);}

/* 麦克风 */
.mic-section{text-align:center;margin-bottom:14px;}
.mic-outer{width:100px;height:100px;border-radius:50%;background:rgba(212,160,23,0.1);border:1.5px solid rgba(212,160,23,0.25);display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px;}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.35);user-select:none;-webkit-user-select:none;touch-action:none;transition:transform 0.1s;}
.mic-btn:active,.mic-btn.listening{transform:scale(0.94);}
.mic-btn.listening{animation:glow 1s infinite;}
@keyframes glow{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 0 0 rgba(212,160,23,0.5);}50%{box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 0 16px rgba(212,160,23,0);}}
.mic-label{font-size:13px;color:rgba(240,200,74,0.8);letter-spacing:1px;}
.transcript{font-size:12px;color:rgba(240,200,74,0.6);font-style:italic;min-height:16px;margin-top:3px;}
.status{font-size:11px;color:rgba(240,200,74,0.45);min-height:14px;margin-top:2px;}

.divider{display:flex;align-items:center;gap:10px;margin:4px 0 12px;}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.divider-diamond{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}

/* 商品管理 */
.mgmt-card{background:rgba(253,246,227,0.97);border-radius:16px;border:1.5px solid var(--gold);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.mgmt-header{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.mgmt-title{font-size:13px;font-weight:600;color:var(--gold-light);letter-spacing:2px;}
.count-badge{font-size:11px;background:rgba(212,160,23,0.25);color:var(--gold-light);padding:2px 9px;border-radius:999px;border:0.5px solid rgba(212,160,23,0.4);}
.product-list{max-height:200px;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.product-item{display:flex;align-items:center;gap:8px;background:white;border:0.5px solid rgba(212,160,23,0.3);border-radius:10px;padding:8px 10px;}
.item-icon{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold-light);flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;color:var(--text-dark);font-weight:500;}
.item-aliases{font-size:10px;color:var(--text-light);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-price{font-size:15px;font-weight:700;color:var(--red);min-width:52px;text-align:right;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;padding:0 2px;line-height:1;}
.del-btn:active{color:var(--red);}
.no-products{text-align:center;color:var(--text-light);font-size:13px;padding:18px;}
.add-section{border-top:1px solid rgba(212,160,23,0.2);padding:10px;}
.add-label{font-size:11px;color:var(--text-mid);letter-spacing:1px;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.add-label::before,.add-label::after{content:'';flex:1;height:0.5px;background:rgba(212,160,23,0.3);}
.add-row{display:flex;gap:7px;margin-bottom:7px;}
.add-row input,.alias-row input{flex:1;border:1px solid rgba(212,160,23,0.35);border-radius:10px;padding:9px 11px;font-size:14px;background:white;color:var(--text-dark);outline:none;font-family:inherit;-webkit-appearance:none;}
.add-row input:focus,.alias-row input:focus{border-color:var(--red);}
.price-input{max-width:86px!important;flex:none!important;}
.alias-row{display:flex;gap:7px;}
.add-btn{background:linear-gradient(135deg,var(--red),var(--red-dark));color:var(--gold-light);border:none;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:1px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.add-btn:active{opacity:0.85;}
.tip{text-align:center;font-size:10px;color:rgba(212,160,23,0.4);margin-top:14px;letter-spacing:1px;line-height:1.8;}
</style>
</head>
<body>

<div class="unlock-overlay" id="unlockOverlay">
  <div class="unlock-icon">🧑‍🍳</div>
  <div class="unlock-title">智能店小二</div>
  <div class="unlock-sub">点击启动应用<br>开启语音报价功能</div>
  <button class="unlock-btn" id="unlockBtn">开始营业</button>
</div>

<div class="top-bar">
  <div class="store-name">老板的杂货店</div>
  <div class="store-sub">✦ 智能店小二 ✦</div>
</div>

<div class="scroll-area">
<div class="inner">

  <!-- 大字价格显示 -->
  <div class="result-big" id="resultBig">
    <div class="result-idle" id="resultContent">按住麦克风，说出商品名称</div>
  </div>

  <div class="mic-section">
    <div class="mic-outer">
      <button class="mic-btn" id="micBtn">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#8B1218" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>
    <div class="mic-label">按住说话，松开查价</div>
    <div class="transcript" id="transcript"></div>
    <div class="status" id="statusBar"></div>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

  <div class="mgmt-card">
    <div class="mgmt-header">
      <span class="mgmt-title">商品管理</span>
      <span class="count-badge" id="countBadge">0 种</span>
    </div>
    <div class="product-list" id="productList"></div>
    <div class="add-section">
      <div class="add-label">添加商品</div>
      <div class="add-row">
        <input type="text" id="addName" placeholder="商品名称（如：可乐）"/>
        <input type="number" id="addPrice" placeholder="价格" class="price-input" min="0" step="0.1" inputmode="decimal"/>
      </div>
      <div class="alias-row">
        <input type="text" id="addAlias" placeholder="别名，逗号隔开（可选）"/>
        <button class="add-btn" id="addBtn">添加</button>
      </div>
    </div>
  </div>
  <p class="tip">数据存于本地 · 无需网络 · 离线可用</p>
</div>
</div>

<script>
const STORAGE_KEY='shopXiao_v4';
let audioCtx=null;

// ── 数字转中文 ──
function numToChinese(n){
  n=Math.round(n*100)/100;
  const yi=['','一','二','三','四','五','六','七','八','九'];
  const dw=['','十','百','千'];
  if(n===0)return'零';
  let s='';
  const yuan=Math.floor(n);
  const fen=Math.round((n-yuan)*100);
  const jiao=Math.floor(fen/10);
  const fen2=fen%10;
  if(yuan>0){
    if(yuan<10)s+=yi[yuan];
    else if(yuan<100)s+=(yuan>=20?yi[Math.floor(yuan/10)]:'')+'十'+(yuan%10?yi[yuan%10]:'');
    else s+=yi[Math.floor(yuan/100)]+'百'+(yuan%100<10&&yuan%100>0?'零':'')+(yuan%100?numToChinese(yuan%100):'');
    s+='元';
  }
  if(jiao>0){s+=yi[jiao]+'角';}
  if(fen2>0){s+=yi[fen2]+'分';}
  if(jiao===0&&fen2===0&&yuan>0)s+='整';
  return s;
}

// ── Web Audio 合成语音 ──
// 用振荡器生成简单提示音，配合大字显示
function playBeep(type='found'){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  if(type==='found'){
    osc.frequency.setValueAtTime(523,audioCtx.currentTime);
    osc.frequency.setValueAtTime(659,audioCtx.currentTime+0.12);
    osc.frequency.setValueAtTime(784,audioCtx.currentTime+0.24);
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.start();osc.stop(audioCtx.currentTime+0.5);
  } else {
    osc.frequency.setValueAtTime(300,audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    osc.start();osc.stop(audioCtx.currentTime+0.3);
  }
}

// ── TTS 播报（多重保险）──
function speak(text){
  // 1. 先播提示音（Web Audio，iOS 无限制）
  playBeep('found');
  // 2. 同时尝试 TTS
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  function doSpeak(){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.9;u.pitch=1.1;u.volume=1;
    // 选择中文语音
    const voices=speechSynthesis.getVoices();
    const zhVoice=voices.find(v=>v.lang.startsWith('zh')&&v.localService)||
                  voices.find(v=>v.lang.startsWith('zh'));
    if(zhVoice)u.voice=zhVoice;
    speechSynthesis.speak(u);
  }
  // iOS 需要延迟
  if(speechSynthesis.getVoices().length>0){doSpeak();}
  else{speechSynthesis.onvoiceschanged=doSpeak;}
}

// ── 解锁（必须在用户点击里初始化 AudioContext）──
document.getElementById('unlockBtn').addEventListener('click',()=>{
  // 初始化 AudioContext
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // 解锁 TTS
  const u=new SpeechSynthesisUtterance('');
  u.volume=0;speechSynthesis.speak(u);
  // 播一声欢迎音
  setTimeout(()=>playBeep('found'),200);
  document.getElementById('unlockOverlay').classList.add('hidden');
  setStatus('准备就绪，按住麦克风问价');
});

// ── 商品数据 ──
let products=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||[
  {id:1,name:'可乐',aliases:['可口可乐','百事','cola'],price:3},
  {id:2,name:'矿泉水',aliases:['水','纯净水','瓶装水'],price:2},
  {id:3,name:'面包',aliases:['吐司','方包'],price:6},
  {id:4,name:'鸡蛋',aliases:['蛋','土鸡蛋'],price:12},
  {id:5,name:'牛奶',aliases:['纯牛奶','鲜奶'],price:8},
];
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(products));}

function showResult(p){
  const priceText=numToChinese(p.price);
  document.getElementById('resultContent').innerHTML=`
    <div class="result-product-name">${p.name}</div>
    <div class="result-price-big">¥${Number(p.price).toFixed(2)}</div>
    <div class="result-price-unit">${priceText}</div>`;
  speak(`${p.name}，${priceText}`);
}

function showNotFound(t){
  document.getElementById('resultContent').innerHTML=`
    <div class="result-notfound">没找到「${t}」<span>请在下方添加此商品</span></div>`;
  playBeep('notfound');
}

function showIdle(){
  document.getElementById('resultContent').innerHTML=`<div class="result-idle">按住麦克风，说出商品名称</div>`;
}

function showListening(){
  document.getElementById('resultContent').innerHTML=`<div class="result-idle" style="color:var(--gold-light)">正在听...</div>`;
}

function renderList(){
  const el=document.getElementById('productList');
  document.getElementById('countBadge').textContent=products.length+' 种';
  if(!products.length){el.innerHTML='<div class="no-products">暂无商品，请在下方添加</div>';return;}
  el.innerHTML=products.map(p=>`
    <div class="product-item">
      <div class="item-icon">${p.name.charAt(0)}</div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        ${p.aliases&&p.aliases.length?`<div class="item-aliases">别名：${p.aliases.join('、')}</div>`:''}
      </div>
      <span class="item-price">¥${Number(p.price).toFixed(2)}</span>
      <button class="del-btn" onclick="del(${p.id})">×</button>
    </div>`).join('');
}

function del(id){if(!confirm('确认删除？'))return;products=products.filter(p=>p.id!==id);save();renderList();}

document.getElementById('addBtn').addEventListener('click',()=>{
  const name=document.getElementById('addName').value.trim();
  const price=parseFloat(document.getElementById('addPrice').value);
  const aliasRaw=document.getElementById('addAlias').value.trim();
  if(!name){setStatus('请填写商品名称');return;}
  if(isNaN(price)||price<0){setStatus('请填写有效价格');return;}
  const aliases=aliasRaw?aliasRaw.split(/[,，]/).map(s=>s.trim()).filter(Boolean):[];
  products.push({id:Date.now(),name,aliases,price});
  save();renderList();
  document.getElementById('addName').value='';
  document.getElementById('addPrice').value='';
  document.getElementById('addAlias').value='';
  setStatus('已添加：'+name);
});

function setStatus(m){document.getElementById('statusBar').textContent=m;}

function findProduct(t){
  t=t.toLowerCase().replace(/\s/g,'');
  for(const p of products){
    if(t.includes(p.name.toLowerCase()))return p;
    for(const a of(p.aliases||[]))if(t.includes(a.toLowerCase()))return p;
  }
  return null;
}

// ── 语音识别 ──
const micBtn=document.getElementById('micBtn');
let recognition=null,isListening=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)setStatus('请用 Safari 打开以使用语音功能');

function createRec(){
  const r=new SR();
  r.lang='zh-CN';r.continuous=false;r.interimResults=true;r.maxAlternatives=3;
  r.onstart=()=>{isListening=true;micBtn.classList.add('listening');showListening();document.getElementById('transcript').textContent='';};
  r.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('transcript').textContent=final||interim;
    if(final){
      let found=null;
      outer:for(let i=e.resultIndex;i<e.results.length;i++)
        for(let j=0;j<e.results[i].length;j++){found=findProduct(e.results[i][j].transcript);if(found)break outer;}
      if(found){showResult(found);setStatus('');}
      else{showNotFound(final);setStatus('');}
    }
  };
  r.onerror=(e)=>{
    const m={'not-allowed':'请允许麦克风权限','no-speech':'没听到声音，请重试'};
    setStatus(m[e.error]||'识别出错，请重试');
    micBtn.classList.remove('listening');isListening=false;showIdle();
  };
  r.onend=()=>{micBtn.classList.remove('listening');isListening=false;};
  return r;
}

function startListen(){if(!SR||isListening)return;recognition=createRec();try{recognition.start();}catch(e){setStatus('请重试');}}
function stopListen(){if(recognition&&isListening)try{recognition.stop();}catch(e){}}

micBtn.addEventListener('mousedown',startListen);
micBtn.addEventListener('mouseup',stopListen);
micBtn.addEventListener('mouseleave',stopListen);
micBtn.addEventListener('touchstart',e=>{e.preventDefault();startListen();},{passive:false});
micBtn.addEventListener('touchend',e=>{e.preventDefault();stopListen();},{passive:false});

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderList();
</script>
</body>
</html>
